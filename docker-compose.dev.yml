
services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: unless-stopped

  admin-api:
    build:
      context: ./apps/admin-api
      dockerfile: Dockerfile
    command: npx nodemon ./src/index.js
    volumes:
      - ./apps/admin-api:/home/app
      - /home/app/node_modules
    ports:
      - "3002:3002"
    env_file:
      - ./apps/admin-api/.env
    environment:
      - NODE_ENV=development
      - TZ=Asia/Kolkata
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - redis
    restart: unless-stopped

  admin-api-worker:
    build:
      context: ./apps/admin-api
      dockerfile: Dockerfile
    command: npx nodemon src/api/workers/index.js
    volumes:
      - ./apps/admin-api:/home/app
      - /home/app/node_modules
    env_file:
      - ./apps/admin-api/.env
    environment:
      - NODE_ENV=development
      - TZ=Asia/Kolkata
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - redis
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: npx nodemon server.js
    volumes:
      - ./apps/api:/home/app
      - /home/app/node_modules
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=development
      - TZ=Asia/Kolkata
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - redis
    restart: unless-stopped

  api-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: npx nodemon src/workers/index.js
    volumes:
      - ./apps/api:/home/app
      - /home/app/node_modules
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=development
      - TZ=Asia/Kolkata
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - redis
    restart: unless-stopped

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
      target: build
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./apps/admin-dashboard:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
    restart: unless-stopped
